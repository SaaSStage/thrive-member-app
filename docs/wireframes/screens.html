<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thrive Member App — Wireframes</title>
<style>
  :root{
    --bg:#000000;
    --bg2:#0c0c0e;
    --card:#1c1c1e;
    --card2:#2c2c2e;
    --hair:#38383a;
    --txt:#ffffff;
    --txt2:#9a9aa0;
    --txt3:#6c6c70;
    --pink:#fa2d48;      /* play / primary action (Apple Music) */
    --green:#30d158;     /* vitality / score */
    --blue:#0a84ff;      /* links */
    --orange:#ff9f0a;
    --purple:#bf5af2;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}
  body{
    background:#161618;
    font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    color:var(--txt);
    padding:40px;
  }
  h1.page{color:#fff;font-size:22px;margin-bottom:24px;font-weight:700;letter-spacing:-.3px}
  .grid{display:flex;flex-wrap:wrap;gap:48px;align-items:flex-start}
  .cell{display:flex;flex-direction:column;gap:10px}
  .cap{color:#cfcfd4;font-size:13px;font-weight:600;text-align:center;letter-spacing:.2px}
  .cap small{display:block;color:#8a8a90;font-weight:400;font-size:11px;margin-top:2px}

  /* ---- phone frame ---- */
  .screen{
    width:390px;height:844px;background:var(--bg);
    border-radius:44px;position:relative;overflow:hidden;
    box-shadow:0 0 0 11px #1a1a1c,0 0 0 13px #2a2a2c,0 26px 60px rgba(0,0,0,.6);
  }
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:124px;height:34px;background:#000;border-radius:20px;z-index:60}
  .statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:55;
    display:flex;align-items:center;justify-content:space-between;padding:18px 30px 0}
  .statusbar .t{font-weight:600;font-size:15px;letter-spacing:.3px}
  .statusbar .r{display:flex;gap:7px;align-items:center;font-size:13px}
  .statusbar svg{display:block}

  .body{position:absolute;top:54px;left:0;right:0;bottom:0;overflow:hidden}
  .scroll{position:absolute;inset:0;overflow:hidden}
  .pad{padding:0 20px}

  .largetitle{font-size:32px;font-weight:800;letter-spacing:-.6px;padding:6px 20px 12px}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 4px}
  .nav .lead{font-size:17px;color:var(--blue);display:flex;align-items:center;gap:4px}
  .nav .title{font-size:17px;font-weight:600}
  .nav .trail{font-size:17px;color:var(--blue);display:flex;gap:16px;align-items:center}

  .sectionhdr{display:flex;align-items:baseline;justify-content:space-between;padding:22px 20px 12px}
  .sectionhdr .h{font-size:22px;font-weight:800;letter-spacing:-.4px}
  .sectionhdr .more{color:var(--blue);font-size:15px}

  .muted{color:var(--txt2)}
  .muted3{color:var(--txt3)}

  /* artwork */
  .art{border-radius:10px;position:relative;overflow:hidden;flex:none;
    display:flex;align-items:flex-end;color:#fff}
  .art .lab{font-size:11px;font-weight:700;padding:8px;line-height:1.15;text-shadow:0 1px 4px rgba(0,0,0,.5)}
  .g1{background:linear-gradient(135deg,#ff6a3d,#fa2d48 70%)}
  .g2{background:linear-gradient(135deg,#0a84ff,#30d1c8)}
  .g3{background:linear-gradient(135deg,#bf5af2,#fa2d48)}
  .g4{background:linear-gradient(135deg,#30d158,#0a84ff)}
  .g5{background:linear-gradient(135deg,#ff9f0a,#ff375f)}
  .g6{background:linear-gradient(135deg,#5e5ce6,#0a84ff)}
  .g7{background:linear-gradient(160deg,#2c2c2e,#3a3a3c)}
  .gscore{background:linear-gradient(135deg,#30d158,#0a84ff 90%)}

  .hscroll{display:flex;gap:14px;overflow:hidden;padding:2px 20px 4px}

  /* track rows */
  .row{display:flex;align-items:center;gap:12px;padding:9px 20px}
  .row .num{width:18px;color:var(--txt3);font-size:14px;text-align:center;flex:none}
  .row .meta{flex:1;min-width:0}
  .row .meta .t1{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .meta .t2{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .tr{color:var(--txt3);font-size:13px}
  .rowline{height:1px;background:var(--hair);margin-left:50px;opacity:.6}
  .rowline.full{margin-left:20px}

  .listcard{background:var(--card);border-radius:14px;margin:0 20px;overflow:hidden}

  /* mini player */
  .mini{position:absolute;left:8px;right:8px;bottom:84px;height:64px;z-index:40;
    background:rgba(40,40,43,.86);backdrop-filter:blur(20px);border-radius:16px;
    display:flex;align-items:center;gap:11px;padding:8px 14px 8px 8px;
    box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .mini .pa{width:48px;height:48px;border-radius:8px;flex:none}
  .mini .mt{flex:1;min-width:0}
  .mini .mt .a{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mt .b{font-size:12px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .ic{color:#fff;display:flex;gap:18px;padding-right:6px}
  .livedot{display:inline-flex;align-items:center;gap:5px;color:var(--pink);font-size:11px;font-weight:700}
  .livedot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--pink)}

  /* tab bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:84px;z-index:50;
    background:rgba(22,22,24,.9);backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,.08);
    display:flex;padding:8px 0 22px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--txt3);font-size:10px;font-weight:500}
  .tab.on{color:var(--pink)}
  .tab svg{display:block}

  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);
    border-radius:999px;padding:9px 14px;color:var(--txt2);font-size:15px}
  .pill.search{margin:6px 20px 0;width:calc(100% - 40px)}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;
    border-radius:14px;font-weight:600;font-size:17px;height:50px}
  .btn.primary{background:var(--pink);color:#fff}
  .btn.green{background:var(--green);color:#04210e}
  .btn.ghost{background:var(--card2);color:#fff}
  .btn.tint{background:rgba(250,45,72,.16);color:var(--pink)}

  .chip{display:inline-block;background:var(--card2);color:var(--txt);font-size:13px;
    padding:7px 13px;border-radius:999px}
  .chip.on{background:#fff;color:#000;font-weight:600}

  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  .badge.locked{background:#3a3a3c;color:#b0b0b6}
  .badge.live{background:var(--pink);color:#fff}

  /* generic helpers */
  .center{display:flex;flex-direction:column;align-items:center;text-align:center}
  .fill{position:absolute;inset:0}
  .stack{display:flex;flex-direction:column}
  .between{display:flex;align-items:center;justify-content:space-between}
  .gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
</style>
</head>
<body>
<h1 class="page">Thrive Member App — Apple Music-style rebuild · Wireframes (iPhone, dark)</h1>
<div class="grid" id="grid"></div>

<script>
/* ----- shared chrome ----- */
function statusbar(){return `
  <div class="notch"></div>
  <div class="statusbar"><div class="t">9:41</div>
   <div class="r">
     <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#fff">
       <rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/>
       <rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
     <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 2.6c2 0 3.9.8 5.3 2.1l1.2-1.3C13.3 1.6 11 .7 8.5.7S3.7 1.6 2 3.4l1.2 1.3C4.6 3.4 6.5 2.6 8.5 2.6zM8.5 6c1 0 2 .4 2.7 1.1l1.2-1.3C11.3 4.7 10 4.2 8.5 4.2S5.7 4.7 4.6 5.8L5.8 7.1C6.5 6.4 7.5 6 8.5 6zm0 3.1l1.7-1.8c-.4-.5-1-.8-1.7-.8s-1.3.3-1.7.8z"/></svg>
     <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#fff" stroke-opacity=".5"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.5" fill="#fff"/><rect x="23" y="4.5" width="1.6" height="4" rx="1" fill="#fff" fill-opacity=".5"/></svg>
   </div>
  </div>`;}

const TAB_ICONS = {
  home:'<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 3 10v10h6v-6h6v6h6V10z"/></svg>',
  radio:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="2.2" fill="currentColor"/><path d="M7.5 7.5a6.4 6.4 0 000 9M16.5 7.5a6.4 6.4 0 010 9M4.7 4.7a10.3 10.3 0 000 14.6M19.3 4.7a10.3 10.3 0 010 14.6"/></svg>',
  library:'<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="18" height="14" rx="2.5" opacity=".35"/><rect x="3" y="5" width="18" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 9h8M8 12h8M8 15h5" stroke="#000" stroke-width="0"/></svg>',
  search:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5 21 21"/></svg>'
};
function tabbar(active){
  const tabs=[['home','Home'],['radio','Radio'],['library','Library'],['search','Search']];
  return `<div class="tabbar">${tabs.map(([k,l])=>
    `<div class="tab ${k===active?'on':''}">${TAB_ICONS[k]}<span>${l}</span></div>`).join('')}</div>`;
}
function mini(art,a,b,live){return `
  <div class="mini">
    <div class="pa ${art}"></div>
    <div class="mt"><div class="a">${a}</div><div class="b">${live?'<span class="livedot">LIVE</span> ':''}${b}</div></div>
    <div class="ic">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5v14l5-5h4l5 5V5l-5 5h-4z" opacity="0"/><path d="M4 18V6l8 6zM14 6h2v12h-2z"/></svg>
    </div>
  </div>`;}

const ICN = {
  play:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>',
  pausebig:'<svg width="30" height="30" viewBox="0 0 24 24" fill="#000"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></svg>',
  shuffle:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h4l9 10h5M3 17h4l3-3.2M21 7h-5l-3 3.2M18 4l3 3-3 3M18 14l3 3-3 3"/></svg>',
  ellipsis:'<svg width="22" height="6" viewBox="0 0 22 6" fill="currentColor"><circle cx="3" cy="3" r="2.4"/><circle cx="11" cy="3" r="2.4"/><circle cx="19" cy="3" r="2.4"/></svg>',
  back:'<svg width="12" height="20" viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M10 2 2 10l8 8"/></svg>',
  mic:'<svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v4M8 21h8" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>'
};

/* ============ SCREENS ============ */
const S=[];
function add(id,name,group,html){S.push({id,name,group,html});}

/* ---------- 1. WELCOME ---------- */
add('welcome','Welcome','Onboarding & Auth',`
  ${statusbar()}
  <div class="body" style="background:radial-gradient(120% 70% at 50% 0%,#2a0d16 0%,#000 60%)">
    <div class="fill center" style="justify-content:space-between;padding:90px 32px 56px">
      <div class="center gap16">
        <div class="art gscore" style="width:96px;height:96px;border-radius:24px"></div>
        <div style="font-size:30px;font-weight:800;letter-spacing:-.5px;margin-top:18px">Thrive</div>
        <div class="muted" style="font-size:17px;max-width:260px">Your provider's stations, playlists, and voice wellness — in one place.</div>
      </div>
      <div class="stack gap12" style="width:100%">
        <div class="btn primary">Sign in with email</div>
        <div class="center muted3" style="font-size:13px;margin-top:6px">Access is provided by your care provider.</div>
      </div>
    </div>
  </div>`);

/* ---------- 2. SIGN-IN (email code) ---------- */
add('signin','Sign in — email code','Onboarding & Auth',`
  ${statusbar()}
  <div class="body">
    <div class="nav"><div class="lead">${ICN.back} <span>Back</span></div><div class="title"></div><div class="trail"></div></div>
    <div class="pad" style="padding-top:18px">
      <div style="font-size:28px;font-weight:800;letter-spacing:-.5px">Enter your code</div>
      <div class="muted" style="font-size:15px;margin-top:8px;line-height:1.4">We sent a 6-digit code to<br><b style="color:#fff">jamie@email.com</b></div>
      <div style="display:flex;gap:10px;margin-top:30px;justify-content:space-between">
        ${['4','7','2','','',''].map((d,i)=>`<div style="flex:1;height:60px;border-radius:12px;background:var(--card);border:1.5px solid ${i===3?'var(--pink)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600">${d}</div>`).join('')}
      </div>
      <div class="muted3" style="font-size:14px;margin-top:24px;text-align:center">Didn't get it? <span style="color:var(--blue)">Resend code</span></div>
      <label style="display:flex;align-items:center;gap:10px;margin-top:30px;color:var(--txt2);font-size:14px">
        <span style="width:22px;height:22px;border-radius:6px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#000;font-size:14px">✓</span>
        Trust this device (stay signed in)
      </label>
    </div>
    <div class="pad" style="position:absolute;bottom:40px;left:0;right:0"><div class="btn primary">Continue</div></div>
  </div>`);

/* ---------- 3. PROFILE SETUP WIZARD ---------- */
add('profile-setup','Profile setup (health context)','Onboarding & Auth',`
  ${statusbar()}
  <div class="body">
    <div class="nav"><div class="lead"></div><div class="title">Set up your profile</div><div class="trail" style="color:var(--txt2)">2 / 5</div></div>
    <div style="height:3px;background:var(--card2);margin:8px 20px 0;border-radius:2px"><div style="width:40%;height:3px;background:var(--green);border-radius:2px"></div></div>
    <div class="pad" style="padding-top:24px">
      <div style="font-size:24px;font-weight:800;letter-spacing:-.4px">A few health details</div>
      <div class="muted" style="font-size:14px;margin-top:8px;line-height:1.4">This helps tailor your voice analysis. You can edit it anytime in Settings.</div>

      <div style="margin-top:26px" class="stack gap16">
        <div><div class="muted" style="font-size:13px;margin-bottom:8px">YEAR OF BIRTH</div>
          <div class="pill" style="width:100%;justify-content:space-between;color:#fff">1986 <span class="muted3">▾</span></div></div>
        <div><div class="muted" style="font-size:13px;margin-bottom:8px">BIOLOGICAL SEX</div>
          <div style="display:flex;gap:8px"><div class="chip on">Female</div><div class="chip">Male</div><div class="chip">Intersex</div></div></div>
        <div><div class="muted" style="font-size:13px;margin-bottom:8px">SMOKING STATUS</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap"><div class="chip">Never</div><div class="chip on">Former</div><div class="chip">Current</div></div></div>
        <div><div class="muted" style="font-size:13px;margin-bottom:8px">PREFERRED LANGUAGE</div>
          <div style="display:flex;gap:8px"><div class="chip on">English</div><div class="chip">Español</div></div></div>
      </div>
    </div>
    <div class="pad" style="position:absolute;bottom:40px;left:0;right:0">
      <div class="btn primary">Continue</div>
      <div class="center muted3" style="font-size:13px;margin-top:14px">Skip for now</div>
    </div>
  </div>`);

/* ---------- 4. HOME ---------- */
add('home','Home','Main tabs',`
  ${statusbar()}
  <div class="body">
    <div class="scroll">
      <div class="nav" style="padding-top:6px"><div class="lead"></div><div class="title"></div>
        <div class="trail"><div class="art g3" style="width:30px;height:30px;border-radius:50%"></div></div></div>
      <div class="largetitle" style="padding-top:0">Home</div>

      <!-- Vitality + voice cards -->
      <div class="hscroll">
        <div class="art gscore" style="width:230px;height:130px;border-radius:16px;padding:14px;color:#04210e">
          <div><div style="font-size:12px;font-weight:700;opacity:.8">YOUR VITALITY SCORE</div>
          <div style="font-size:40px;font-weight:800;line-height:1.1;margin-top:6px">82</div>
          <div style="font-size:12px;font-weight:600">+3 since last check · Tap to view</div></div>
        </div>
        <div class="art g3" style="width:230px;height:130px;border-radius:16px;padding:14px">
          <div><div style="font-size:12px;font-weight:700;opacity:.85">VOICE CHECK-IN</div>
          <div style="font-size:19px;font-weight:700;line-height:1.2;margin-top:8px">Record your weekly sample</div>
          <div style="font-size:12px;margin-top:8px;opacity:.9">~2 min · 3 short recordings</div></div>
        </div>
      </div>

      <div class="sectionhdr"><div class="h">Recently Played</div></div>
      <div class="hscroll">
        ${[['g1','Calm Mornings','Playlist'],['g2','Thrive Live','Station'],['g4','Focus Flow','Playlist'],['g5','Sleep Sounds','Playlist']].map(([g,t,s])=>
          `<div class="cell" style="width:148px;gap:8px"><div class="art ${g}" style="width:148px;height:148px"></div>
           <div><div style="font-size:14px;font-weight:600">${t}</div><div class="muted" style="font-size:13px">${s}</div></div></div>`).join('')}
      </div>

      <div class="sectionhdr"><div class="h">From Your Provider</div></div>
      <div class="hscroll">
        ${[['g6','Wellness Radio','Live now'],['g7','Recovery Mix','24 tracks']].map(([g,t,s])=>
          `<div class="cell" style="width:300px;gap:8px"><div class="art ${g}" style="width:300px;height:150px;border-radius:14px"><div class="lab">${t}</div></div>
           <div class="muted" style="font-size:13px">${s}</div></div>`).join('')}
      </div>
      <div style="height:170px"></div>
    </div>
    ${mini('g2','Thrive Live','Now: "Weightless" — Marconi Union',true)}
    ${tabbar('home')}
  </div>`);

/* ---------- 5. RADIO ---------- */
add('radio','Radio (live stations)','Main tabs',`
  ${statusbar()}
  <div class="body">
    <div class="scroll">
      <div class="largetitle" style="padding-top:8px">Radio</div>
      <div class="pad muted" style="font-size:14px;margin-top:-6px;margin-bottom:6px">Live stations your provider authorized</div>

      <div class="hscroll" style="margin-top:8px">
        <div class="art g2" style="width:330px;height:180px;border-radius:16px;padding:16px">
          <div><span class="badge live">● LIVE</span><div style="font-size:24px;font-weight:800;margin-top:10px">Thrive Live</div>
          <div style="font-size:13px;opacity:.9">Now: Weightless — Marconi Union</div></div>
        </div>
      </div>

      <div class="sectionhdr"><div class="h">All Stations</div></div>
      ${[['g1','Calm Channel','Ambient · LIVE',true],['g4','Focus FM','Instrumental · LIVE',true],['g5','Recovery Radio','Spoken word · LIVE',true],['g6','Sleep Stream','Soundscapes · LIVE',true]].map(([g,t,s])=>`
        <div class="row"><div class="art ${g}" style="width:54px;height:54px;border-radius:8px"></div>
          <div class="meta"><div class="t1">${t}</div><div class="t2"><span class="livedot">LIVE</span> &nbsp;${s.replace(' · LIVE','')}</div></div>
          <div class="tr">${ICN.play}</div></div>
        <div class="rowline"></div>`).join('')}

      <div class="row" style="opacity:.55"><div class="art g7" style="width:54px;height:54px;border-radius:8px"></div>
        <div class="meta"><div class="t1">Premium Therapy Station</div><div class="t2">Requires upgraded plan</div></div>
        <span class="badge locked">🔒 Locked</span></div>
      <div style="height:170px"></div>
    </div>
    ${mini('g2','Thrive Live','Now: "Weightless" — Marconi Union',true)}
    ${tabbar('radio')}
  </div>`);

/* ---------- 6. LIBRARY ---------- */
add('library','Library','Main tabs',`
  ${statusbar()}
  <div class="body">
    <div class="scroll">
      <div class="largetitle" style="padding-top:8px">Library</div>
      <div class="listcard" style="margin-top:4px">
