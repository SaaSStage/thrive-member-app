<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thrive — Healing Frequency theme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a16;
    --ink:#f4f1ea;          /* warm off-white */
    --ink2:#a7abc4;         /* muted lavender-grey */
    --ink3:#6f7392;
    --glass:rgba(255,255,255,.055);
    --glass2:rgba(255,255,255,.09);
    --hair:rgba(255,255,255,.10);
    --teal:#5eead4;
    --violet:#a78bfa;
    --rose:#f0a6d8;
    --gold:#f3cd8b;
    --indigo:#818cf8;
    --serif:"Fraunces",Georgia,serif;
    --sans:"Nunito",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}
  body{background:#101426;font-family:var(--sans);color:var(--ink);padding:40px}
  h1.page{font-family:var(--serif);color:#fff;font-size:24px;margin-bottom:8px;font-weight:500;letter-spacing:.2px}
  .sub{color:#9ea3c0;margin-bottom:26px;font-size:14px}
  .grid{display:flex;flex-wrap:wrap;gap:48px;align-items:flex-start}
  .cell{display:flex;flex-direction:column;gap:10px}
  .cap{color:#cfd2e6;font-size:13px;font-weight:700;text-align:center}
  .cap small{display:block;color:#878bab;font-weight:500;font-size:11px;margin-top:2px}

  .screen{width:390px;height:844px;background:var(--bg);border-radius:44px;position:relative;overflow:hidden;
    box-shadow:0 0 0 11px #14182b,0 0 0 13px #20264a,0 26px 60px rgba(0,0,0,.6)}
  /* signature aurora ambience behind every screen */
  .aura{position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(60% 38% at 18% 8%, rgba(94,234,212,.20), transparent 70%),
      radial-gradient(70% 40% at 92% 22%, rgba(167,139,250,.22), transparent 70%),
      radial-gradient(80% 45% at 50% 108%, rgba(240,166,216,.16), transparent 70%),
      linear-gradient(180deg,#0a0e1f 0%, #070a16 60%, #05060f 100%);}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:124px;height:34px;background:#000;border-radius:20px;z-index:60}
  .statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:55;display:flex;align-items:center;justify-content:space-between;padding:18px 30px 0}
  .statusbar .t{font-weight:700;font-size:15px}
  .statusbar .r{display:flex;gap:7px;align-items:center}

  .body{position:absolute;top:54px;left:0;right:0;bottom:0;overflow:hidden;z-index:2}
  .scroll{position:absolute;inset:0;overflow:hidden}
  .pad{padding:0 22px}
  .muted{color:var(--ink2)} .muted3{color:var(--ink3)}

  .largetitle{font-family:var(--serif);font-size:34px;font-weight:400;letter-spacing:.2px;padding:8px 22px 12px}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 4px}
  .nav .lead,.nav .trail{font-size:17px;color:var(--teal);display:flex;gap:14px;align-items:center}
  .nav .title{font-family:var(--serif);font-size:18px;font-weight:500}
  .sectionhdr{display:flex;align-items:baseline;justify-content:space-between;padding:24px 22px 12px}
  .sectionhdr .h{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:.2px}
  .sectionhdr .more{color:var(--teal);font-size:14px;font-weight:600}

  /* aurora gradients for artwork */
  .fg1{background:linear-gradient(140deg,#2dd4bf,#6366f1)}
  .fg2{background:linear-gradient(140deg,#a78bfa,#ec6fb8)}
  .fg3{background:linear-gradient(140deg,#f3cd8b,#f0a6d8)}
  .fg4{background:linear-gradient(140deg,#22d3ee,#a78bfa)}
  .fg5{background:linear-gradient(140deg,#34d399,#2dd4bf)}
  .fg6{background:linear-gradient(140deg,#5b6bf0,#9b6bf0)}
  .fg7{background:rgba(255,255,255,.06)}
  .gscore{background:conic-gradient(from 210deg,#5eead4,#818cf8,#f0a6d8,#f3cd8b,#5eead4)}

  .art{border-radius:18px;position:relative;overflow:hidden;flex:none;display:flex;align-items:flex-end;color:#fff}
  .art .lab{font-family:var(--serif);font-size:15px;font-weight:500;padding:12px;z-index:2;text-shadow:0 1px 8px rgba(0,0,0,.4)}
  .art .ripple{position:absolute;inset:0;z-index:1;opacity:.55}

  .hscroll{display:flex;gap:14px;overflow:hidden;padding:2px 22px 4px}

  .card{background:var(--glass);border:1px solid var(--hair);border-radius:20px;backdrop-filter:blur(14px)}
  .listcard{background:var(--glass);border:1px solid var(--hair);border-radius:20px;margin:0 22px;overflow:hidden}

  .row{display:flex;align-items:center;gap:13px;padding:11px 18px}
  .row .num{width:18px;color:var(--ink3);font-size:14px;text-align:center;flex:none;font-family:var(--serif)}
  .row .meta{flex:1;min-width:0}
  .row .meta .t1{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .meta .t2{font-size:13px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .tr{color:var(--ink3);font-size:13px}
  .rowline{height:1px;background:var(--hair);margin-left:52px}
  .rowline.full{margin-left:18px}

  .mini{position:absolute;left:10px;right:10px;bottom:86px;height:66px;z-index:40;
    background:rgba(20,24,44,.72);border:1px solid var(--hair);backdrop-filter:blur(22px);border-radius:20px;
    display:flex;align-items:center;gap:12px;padding:8px 16px 8px 8px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
  .mini .pa{width:50px;height:50px;border-radius:14px;flex:none;position:relative;overflow:hidden}
  .mini .mt{flex:1;min-width:0}
  .mini .mt .a{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mt .b{font-size:12px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .ic{color:var(--teal);display:flex;gap:18px;padding-right:6px}
  .livedot{display:inline-flex;align-items:center;gap:5px;color:var(--teal);font-size:11px;font-weight:800;letter-spacing:.4px}
  .livedot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}

  .tabbar{position:absolute;left:0;right:0;bottom:0;height:84px;z-index:50;
    background:rgba(10,13,28,.78);border-top:1px solid var(--hair);backdrop-filter:blur(22px);
    display:flex;padding:10px 0 22px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--ink3);font-size:10px;font-weight:600}
  .tab.on{color:var(--teal)}

  .pill{display:inline-flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--hair);
    border-radius:999px;padding:10px 15px;color:var(--ink2);font-size:15px}
  .pill.search{margin:6px 22px 0;width:calc(100% - 44px)}

  .btn{display:flex;align-items:center;justify-content:center;gap:9px;border-radius:18px;font-weight:700;font-size:16px;height:52px}
  .btn.primary{background:linear-gradient(135deg,#5eead4,#818cf8);color:#06121f;box-shadow:0 10px 28px rgba(94,234,212,.25)}
  .btn.gold{background:linear-gradient(135deg,#f3cd8b,#f0a6d8);color:#2a1130}
  .btn.ghost{background:var(--glass2);border:1px solid var(--hair);color:#fff}
  .btn.tint{background:rgba(94,234,212,.14);border:1px solid rgba(94,234,212,.3);color:var(--teal)}

  .chip{display:inline-block;background:var(--glass2);border:1px solid var(--hair);color:var(--ink);font-size:13px;padding:8px 14px;border-radius:999px}
  .chip.on{background:linear-gradient(135deg,#5eead4,#a78bfa);border-color:transparent;color:#06121f;font-weight:700}

  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;letter-spacing:.4px}
  .badge.locked{background:rgba(255,255,255,.12);color:#cfd2e6}
  .badge.live{background:rgba(94,234,212,.18);border:1px solid rgba(94,234,212,.5);color:var(--teal)}

  .center{display:flex;flex-direction:column;align-items:center;text-align:center}
  .fill{position:absolute;inset:0}
  .between{display:flex;align-items:center;justify-content:space-between}
  .serif{font-family:var(--serif)}
</style>
</head>
<body>
<h1 class="page">Thrive Member App — “Healing Frequency” theme</h1>
<div class="sub">Alternate visual direction: deep-indigo aurora palette, concentric frequency-ripple graphics, Fraunces serif + Nunito.</div>
<div class="grid" id="grid"></div>

<script>
function statusbar(){return `
  <div class="notch"></div>
  <div class="statusbar"><div class="t">9:41</div>
   <div class="r">
     <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#fff">
       <rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/>
       <rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
     <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 2.6c2 0 3.9.8 5.3 2.1l1.2-1.3C13.3 1.6 11 .7 8.5.7 6 .7 3.7 1.6 2 3.4l1.2 1.3C4.6 3.4 6.5 2.6 8.5 2.6zM8.5 6c1 0 2 .4 2.7 1.1l1.2-1.3C11.3 4.7 10 4.2 8.5 4.2S5.7 4.7 4.6 5.8L5.8 7.1C6.5 6.4 7.5 6 8.5 6z"/></svg>
     <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#fff" stroke-opacity=".5"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.5" fill="#fff"/><rect x="23" y="4.5" width="1.6" height="4" rx="1" fill="#fff" fill-opacity=".5"/></svg>
   </div>
  </div>`;}

/* concentric frequency-ripple motif used on artwork & orbs */
function ripple(stroke="rgba(255,255,255,.9)"){
  return `<svg class="ripple" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
    ${[14,24,34,44,54].map((r,i)=>`<circle cx="50" cy="58" r="${r}" fill="none" stroke="${stroke}" stroke-width="${1.4-i*0.12}" opacity="${0.7-i*0.12}"/>`).join('')}
  </svg>`;}
function fart(cls,w,h,r,lab){return `<div class="art ${cls}" style="width:${w};height:${h};${r?`border-radius:${r};`:''}">${ripple()}${lab?`<div class="lab">${lab}</div>`:''}</div>`;}

const TAB = {
  home:'<svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 3 10v10h6v-6h6v6h6V10z"/></svg>',
  radio:'<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="2.2" fill="currentColor"/><path d="M7.5 7.5a6.4 6.4 0 000 9M16.5 7.5a6.4 6.4 0 010 9M4.7 4.7a10.3 10.3 0 000 14.6M19.3 4.7a10.3 10.3 0 010 14.6"/></svg>',
  library:'<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M7 9h10M7 12h10M7 15h6"/></svg>',
  search:'<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5 21 21"/></svg>'
};
function tabbar(active){const t=[['home','Home'],['radio','Frequencies'],['library','Library'],['search','Search']];
  return `<div class="tabbar">${t.map(([k,l])=>`<div class="tab ${k===active?'on':''}">${TAB[k]}<span>${l}</span></div>`).join('')}</div>`;}
function mini(cls,a,b,live){return `
  <div class="mini"><div class="pa ${cls}">${ripple()}</div>
    <div class="mt"><div class="a">${a}</div><div class="b">${live?'<span class="livedot">LIVE</span> ':''}${b}</div></div>
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18V6l8 6zM14 6h2v12h-2z"/></svg></div></div>`;}
const ICN={play:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>',
  shuffle:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h4l9 10h5M3 17h4l3-3.2M21 7h-5l-3 3.2M18 4l3 3-3 3M18 14l3 3-3 3"/></svg>',
  ellipsis:'<svg width="20" height="6" viewBox="0 0 22 6" fill="currentColor"><circle cx="3" cy="3" r="2.3"/><circle cx="11" cy="3" r="2.3"/><circle cx="19" cy="3" r="2.3"/></svg>',
  back:'<svg width="12" height="20" viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M10 2 2 10l8 8"/></svg>',
  mic:'<svg width="34" height="34" viewBox="0 0 24 24" fill="#06121f"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v4M8 21h8" fill="none" stroke="#06121f" stroke-width="1.8"/></svg>'};

const S=[];function add(id,name,group,html){S.push({id,name,group,html});}

/* ---- WELCOME ---- */
add('welcome','Welcome','Onboarding',`
  ${statusbar()}
  <div class="body"><div class="fill center" style="justify-content:space-between;padding:74px 32px 56px">
    <div class="center">
      <div style="position:relative;width:140px;height:140px">
        ${ripple("rgba(255,255,255,.55)").replace('class="ripple"','style="position:absolute;inset:0"')}
        <div class="fill" style="background:conic-gradient(from 210deg,#5eead4,#818cf8,#f0a6d8,#f3cd8b,#5eead4);border-radius:50%;mask:radial-gradient(circle,transparent 38%,#000 39%)"></div>
        <div class="fill center" style="justify-content:center"><div class="serif" style="font-size:30px">432</div></div>
      </div>
      <div class="serif" style="font-size:36px;font-weight:400;margin-top:26px;letter-spacing:1px">Thrive</div>
      <div class="muted" style="font-size:16px;max-width:270px;margin-top:8px;line-height:1.5">Healing frequencies, curated for you by your care provider.</div>
    </div>
    <div style="width:100%"><div class="btn primary">Begin with email</div>
      <div class="center muted3" style="font-size:13px;margin-top:16px">Your access is provided by your practitioner.</div></div>
  </div></div>`);

/* ---- HOME ---- */
add('home','Home','Main',`
  ${statusbar()}
  <div class="body"><div class="scroll">
    <div class="nav" style="padding-top:6px"><div class="lead"></div><div class="title"></div><div class="trail">${fart('fg2','30px','30px','50%','')}</div></div>
    <div class="largetitle" style="padding-top:0">Good evening, Jamie</div>

    <div class="hscroll">
      <div class="card" style="width:236px;padding:16px;display:flex;gap:14px;align-items:center">
        <div style="position:relative;width:74px;height:74px;flex:none">
          <div class="fill" style="background:conic-gradient(from 210deg,#5eead4,#818cf8,#f0a6d8,#f3cd8b,#5eead4);border-radius:50%;mask:radial-gradient(circle,transparent 56%,#000 57%)"></div>
          <div class="fill center" style="justify-content:center"><div class="serif" style="font-size:26px">82</div></div>
        </div>
        <div><div class="muted" style="font-size:12px;font-weight:700;letter-spacing:.4px">VITALITY</div>
          <div class="serif" style="font-size:17px;margin-top:2px">Resonant</div>
          <div style="color:var(--teal);font-size:12px;font-weight:700;margin-top:3px">▲ 3 this week</div></div>
      </div>
      <div class="card" style="width:236px;padding:16px">
        <div class="muted" style="font-size:12px;font-weight:700;letter-spacing:.4px">VOICE CHECK-IN</div>
        <div class="serif" style="font-size:19px;margin-top:8px;line-height:1.25">Tune your weekly sample</div>
        <div class="muted" style="font-size:12px;margin-top:8px">~2 min · 3 recordings</div></div>
    </div>

    <div class="sectionhdr"><div class="h">Continue Listening</div></div>
    <div class="hscroll">
      ${[['fg1','528 Hz · Renewal','Frequency'],['fg2','Calm Mornings','Playlist'],['fg4','Theta Drift','Frequency'],['fg5','Deep Rest','Playlist']].map(([g,t,s])=>
        `<div class="cell" style="width:150px;gap:9px">${fart(g,'150px','150px','18px','')}
         <div><div class="serif" style="font-size:15px">${t}</div><div class="muted" style="font-size:13px">${s}</div></div></div>`).join('')}
    </div>

    <div class="sectionhdr"><div class="h">From Your Provider</div></div>
    <div class="hscroll">${fart('fg6','300px','150px','20px','Wellness Frequencies · Live now')}<div style="width:8px"></div></div>
    <div style="height:172px"></div>
  </div>
  ${mini('fg1','528 Hz · Renewal','Solfeggio healing tone',true)}
  ${tabbar('home')}</div>`);

/* ---- FREQUENCIES (radio) ---- */
add('radio','Frequencies (live)','Main',`
  ${statusbar()}
  <div class="body"><div class="scroll">
    <div class="largetitle" style="padding-top:8px">Frequencies</div>
    <div class="pad muted" style="font-size:14px;margin-top:-8px;margin-bottom:8px">Live healing tones authorized for you</div>
    <div class="hscroll">
      <div class="art fg4" style="width:332px;height:186px;border-radius:22px;padding:18px">${ripple()}
        <div style="z-index:2"><span class="badge live">● LIVE</span>
          <div class="serif" style="font-size:25px;margin-top:10px">528 Hz · Renewal</div>
          <div style="font-size:13px;opacity:.92">The “miracle” solfeggio tone · streaming now</div></div></div>
    </div>
    <div class="sectionhdr"><div class="h">All Frequencies</div></div>
    ${[['fg1','396 Hz · Release','Letting go of fear'],['fg5','432 Hz · Harmony','Natural tuning'],['fg2','639 Hz · Connection','Heart & relationships'],['fg6','741 Hz · Clarity','Awakening intuition']].map(([g,t,s])=>`
      <div class="row">${fart(g,'56px','56px','16px','')}
        <div class="meta"><div class="t1">${t}</div><div class="t2"><span class="livedot">LIVE</span> &nbsp;${s}</div></div>
        <div class="tr">${ICN.play}</div></div><div class="rowline"></div>`).join('')}
    <div class="row" style="opacity:.5">${fart('fg7','56px','56px','16px','')}
      <div class="meta"><div class="t1">963 Hz · Unity</div><div class="t2">Requires upgraded plan</div></div>
      <span class="badge locked">🔒 Locked</span></div>
    <div style="height:172px"></div>
  </div>
  ${mini('fg4','528 Hz · Renewal','Solfeggio healing tone',true)}
  ${tabbar('radio')}</div>`);

/* ---- LIBRARY ---- */
add('library','Library','Main',`
  ${statusbar()}
  <div class="body"><div class="scroll">
    <div class="largetitle" style="padding-top:8px">Library</div>
    <div class="listcard" style="margin-top:4px">
      ${[['◎','Frequencies'],['▤','Playlists'],['♪','On-Demand Sessions'],['↧','Recently Added']].map(([i,t])=>
        `<div class="row" style="padding:14px 18px"><span style="color:var(--teal);width:24px;text-align:center;font-size:18px">${i}</span>
          <div class="meta"><div class="t1">${t}</div></div><span class="muted3">›</span></div>`).join('<div class="rowline full"></div>')}
    </div>
    <div class="sectionhdr"><div class="h">Your Playlists</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:0 22px">
      ${[['fg1','Calm Mornings','18 sessions'],['fg5','Deep Rest','12 sessions'],['fg3','Heart Opening','9 sessions'],['fg4','Focus Flow','24 sessions']].map(([g,t,s])=>
        `<div class="cell" style="gap:8px">${fart(g,'100%','auto','18px','')}
         <div><div class="serif" style="font-size:15px">${t}</div><div class="muted" style="font-size:13px">${s}</div></div></div>`)
         .join('').replace(/height:auto/g,'aspect-ratio:1;height:auto')}
    </div>
    <div style="height:172px"></div>
  </div>
  ${mini('fg4','528 Hz · Renewal','Solfeggio healing tone',true)}
  ${tabbar('library')}</div>`);

/* ---- STATION / FREQUENCY PAGE ---- */
add('station','Frequency page','Detail',`
  ${statusbar()}
  <div class="body"><div class="scroll">
    <div class="nav" style="position:absolute;z-index:30;left:0;right:0"><div class="lead">${ICN.back}</div><div class="title"></div><div class="trail">${ICN.ellipsis}</div></div>
    <div class="art fg4" style="height:332px;border-radius:0;align-items:flex-end;padding:22px">${ripple()}
      <div style="z-index:2"><span class="badge live">● LIVE</span>
        <div class="serif" style="font-size:30px;margin-top:10px">528 Hz · Renewal</div>
        <div style="font-size:14px;opacity:.92">Solfeggio frequency · authorized by Dr. Patel</div></div></div>
    <div class="pad" style="display:flex;gap:12px;margin-top:18px">
      <div class="btn primary" style="flex:1">${ICN.play.replace('currentColor','#06121f')} Play Live</div>
      <div class="btn ghost" style="width:56px">${ICN.shuffle}</div></div>
