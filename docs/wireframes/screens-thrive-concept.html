<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thrive — workflow map (mandala)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0814;--ink:#f5f2ee;--ink2:#a8a6c0;--ink3:#6e6b8a;
    --glass:rgba(255,255,255,.055);--glass2:rgba(255,255,255,.10);--hair:rgba(255,255,255,.11);
    --teal:#5eead4;--violet:#a78bfa;--gold:#f3cd8b;--rose:#f0a6d8;
    --spectral:conic-gradient(from 210deg,#5eead4,#818cf8,#a78bfa,#f0a6d8,#f3cd8b,#5eead4);
    --disp:"Sora",system-ui,sans-serif;--sans:"Inter",system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  body{background:#0a0712;font-family:var(--sans);color:var(--ink);padding:40px}
  h1{font-family:var(--disp);font-size:23px;font-weight:600;margin-bottom:6px}
  .sub{color:#b9b6d0;font-size:14px;max-width:880px;line-height:1.5;margin-bottom:36px}

  /* flow grouping */
  .flows{display:flex;flex-direction:column;gap:60px}
  .flow-block{display:flex;flex-direction:column;gap:0}
  .flow-header{padding:18px 24px 20px;border-left:3px solid var(--teal);margin-bottom:32px;background:rgba(94,234,212,.04);border-radius:0 12px 12px 0}
  .flow-title{font-family:var(--disp);font-size:20px;font-weight:700;color:var(--teal);margin-bottom:5px}
  .flow-desc{color:#b9b6d0;font-size:14px}
  .screen-row{display:flex;flex-wrap:wrap;gap:42px;align-items:flex-start}
  .cell{display:flex;flex-direction:column;gap:10px}
  .cap{color:#d6d3e8;font-size:13px;font-weight:600;text-align:center}
  .taps{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;max-width:384px}
  .taps li{color:#7a778f;font-size:11px;line-height:1.4;padding-left:10px;position:relative}
  .taps li::before{content:"▸";position:absolute;left:0;color:var(--teal);font-size:10px;top:1px}

  .screen{width:384px;height:832px;border-radius:46px;position:relative;overflow:hidden;background:var(--bg);
    box-shadow:0 0 0 11px #181426,0 0 0 13px #2a2440,0 26px 70px rgba(0,0,0,.6)}
  .aura{position:absolute;inset:0;z-index:0;background:
    radial-gradient(55% 32% at 16% 5%,rgba(94,234,212,.16),transparent 70%),
    radial-gradient(58% 34% at 90% 12%,rgba(167,139,250,.22),transparent 70%),
    radial-gradient(75% 42% at 50% 100%,rgba(243,205,139,.14),transparent 72%),
    linear-gradient(180deg,#0d0a1b,#0b0814 55%,#070510)}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:30px;background:#000;border-radius:16px;z-index:60}
  .sbar{position:absolute;top:0;left:0;right:0;height:50px;z-index:55;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;font-size:13px;font-weight:600}
  .body{position:absolute;top:50px;left:0;right:0;bottom:0;z-index:2;overflow:hidden}
  .pad{padding:0 20px}.muted{color:var(--ink2)}.muted3{color:var(--ink3)}
  .center{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center}
  .between{display:flex;align-items:center;justify-content:space-between}
  .disp{font-family:var(--disp)}
  .score{font-family:var(--disp);font-weight:700;letter-spacing:-1px;line-height:.95}

  .glass{background:var(--glass);border:1px solid var(--hair);border-radius:22px;position:relative;overflow:hidden;backdrop-filter:blur(14px)}
  .wm{position:absolute;pointer-events:none}
  .breathe{animation:breathe 7s ease-in-out infinite}
  .spin{animation:spin 110s linear infinite}
  .spinr{animation:spin 110s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{0%,100%{transform:scale(.94);opacity:.7}50%{transform:scale(1.06);opacity:1}}

  .btn{display:flex;align-items:center;justify-content:center;border-radius:18px;font-family:var(--disp);font-weight:600;font-size:16px;height:54px;
    background:linear-gradient(120deg,#5eead4,#818cf8 55%,#a78bfa);color:#0a0814}
  .btn-gold{background:linear-gradient(120deg,#f3cd8b,#e8a830);color:#1a1000}
  .btn-ghost{background:transparent;border:1px solid var(--hair);color:var(--ink2)}
  .btn-teal{background:linear-gradient(120deg,#5eead4,#3aa99a);color:#04201c}
  .yoy{font-family:var(--disp);font-weight:800;font-size:98px;line-height:.9;
    background:linear-gradient(160deg,#c4b5fd,#8b5cf6 55%,#5b21b6);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 16px rgba(167,139,250,.55))}
  .logoW{width:152px;height:152px;object-fit:contain;margin:0 -12px}
  .logoW1{filter:brightness(0) invert(.78) opacity(.92) drop-shadow(0 0 12px rgba(180,175,205,.20))}
  .chip{display:inline-block;background:var(--glass2);border:1px solid var(--hair);font-size:12px;padding:7px 13px;border-radius:999px}
  .chip-sel{background:var(--gold);color:#1a1000;border-color:transparent;font-weight:700}
  .chip-teal{background:rgba(94,234,212,.15);border-color:rgba(94,234,212,.4);color:var(--teal)}
  .live{display:inline-flex;align-items:center;gap:5px;color:var(--teal);font-size:11px;font-weight:700}
  .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
  .field{background:var(--glass);border:1px solid var(--hair);border-radius:14px;height:44px;display:flex;align-items:center;padding:0 14px;color:var(--ink2);font-size:14px;gap:8px}
  .sec{font-family:var(--disp);font-size:20px;font-weight:600;padding:22px 20px 12px}

  .mini{position:absolute;left:10px;right:10px;bottom:82px;height:62px;z-index:40;background:rgba(20,16,34,.75);
    border:1px solid var(--hair);backdrop-filter:blur(20px);border-radius:18px;display:flex;align-items:center;gap:11px;padding:7px 14px 7px 7px}
  .mini .mt{flex:1;min-width:0}.mini .mt .a{font-family:var(--disp);font-size:13px;font-weight:600}.mini .mt .b{font-size:11px;color:var(--ink2)}
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:82px;z-index:50;background:rgba(13,10,27,.82);border-top:1px solid var(--hair);backdrop-filter:blur(20px);display:flex;padding:9px 0 20px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink3);font-size:10px;font-weight:600}
  .tab.on{color:var(--gold)}

  /* settings rows */
  .srow{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--hair)}
  .srow:last-child{border-bottom:none}
  .srow-lbl{font-size:14px}
  .srow-val{color:var(--ink3);font-size:18px}
</style>
</head>
<body>
<h1>Thrive — real screens · workflow map</h1>
<div class="sub">Every screen the member sees, grouped by workflow. Each phone frame shows a real screen. Below each frame: the screen name and the annotated tap targets (▸ control → destination). Dark canvas · breathing mandalas · glass cards · Sora + Inter.</div>
<div class="flows" id="flows"></div>

<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff6d8"/><stop offset=".4" stop-color="#f3cd8b"/><stop offset=".75" stop-color="#c8961f"/><stop offset="1" stop-color="#8a5a0f"/></linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd9a0"/><stop offset=".5" stop-color="#ff9f5a"/><stop offset="1" stop-color="#b5471a"/></linearGradient>
  <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d6fff5"/><stop offset=".5" stop-color="#5eead4"/><stop offset="1" stop-color="#0e8f80"/></linearGradient>
  <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#efe6ff"/><stop offset=".5" stop-color="#a78bfa"/><stop offset="1" stop-color="#5b3bb8"/></linearGradient>
  <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe3f4"/><stop offset=".5" stop-color="#f0a6d8"/><stop offset="1" stop-color="#b13a86"/></linearGradient>
  <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset=".4" stop-color="#a78bfa"/><stop offset="1" stop-color="#f3cd8b"/></linearGradient>
  <linearGradient id="sw" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f3cd8b"/><stop offset=".34" stop-color="#ff9f5a"/><stop offset=".68" stop-color="#f0a6d8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
  <radialGradient id="swglow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff1d6" stop-opacity=".6"/><stop offset="38%" stop-color="#f6b870" stop-opacity=".22"/><stop offset="100%" stop-color="#f6b870" stop-opacity="0"/></radialGradient>
  <linearGradient id="yg" x1="0" y1="0" x2=".5" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset=".5" stop-color="#f4f4f8"/><stop offset="1" stop-color="#e2e2ec"/></linearGradient>
  <linearGradient id="yg1" x1="0" y1="0" x2=".5" y2="1"><stop offset="0" stop-color="#c7c1d6"/><stop offset=".5" stop-color="#aaa3c4"/><stop offset="1" stop-color="#8e87ab"/></linearGradient>
  <linearGradient id="yg2" x1="0" y1="0" x2=".5" y2="1"><stop offset="0" stop-color="#ddd2ff"/><stop offset=".5" stop-color="#b9a6f5"/><stop offset="1" stop-color="#9a7ee8"/></linearGradient>
  <linearGradient id="yg3" x1="0" y1="0" x2=".5" y2="1"><stop offset="0" stop-color="#efebe2"/><stop offset=".5" stop-color="#dad3c6"/><stop offset="1" stop-color="#c0b6a4"/></linearGradient>
  <filter id="gA" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2"/></filter>
  <filter id="gB" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="gC" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.1"/></filter>
</defs></svg>

<script>
function ring(size,n,dF,rF,phase){const c=size/2,b=size/2,d=b*dF,r=b*rF;let s='';
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n+(phase||0);
    s+=`<circle cx="${(c+d*Math.cos(a)).toFixed(2)}" cy="${(c+d*Math.sin(a)).toFixed(2)}" r="${r.toFixed(2)}"/>`;}return s;}
function mandala(size,grad,op,glowOp){op=op==null?0.6:op;glowOp=glowOp==null?0.7:glowOp;
  const c=size/2,b=size/2;
  const geo=ring(size,24,0.46,0.46)+ring(size,12,0.30,0.30,Math.PI/12)+ring(size,12,0.62,0.20);
  const fr=`<circle cx="${c}" cy="${c}" r="${(b*0.84).toFixed(1)}"/><circle cx="${c}" cy="${c}" r="${(b*0.97).toFixed(1)}"/>`;
  const sw=(size*0.0030).toFixed(2);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" style="overflow:visible">
    <g stroke="url(#${grad})" stroke-width="${(sw*1.9).toFixed(2)}" filter="url(#gB)" opacity="${(glowOp*0.85).toFixed(2)}">${fr}${geo}</g>
    <g stroke="url(#${grad})" stroke-width="${(sw*1.1).toFixed(2)}" filter="url(#gA)" opacity="${glowOp}">${fr}${geo}</g>
    <g stroke="url(#${grad})" stroke-width="${sw}" opacity="${op}">${fr}${geo}</g>
    <circle cx="${c}" cy="${c}" r="${(b*0.05).toFixed(1)}" fill="url(#${grad})" filter="url(#gA)"/></svg>`;}

function cardWM(grad,dir){return `<div class="wm ${dir||'spin'}" style="right:-50px;top:-50px;width:170px;height:170px">${mandala(170,grad,0.5,0.6)}</div>`;}

function yLetter(h,n,grad){grad=grad||'yg';const w=h*0.64,sw=h*0.155,jx=w*0.5,jy=h*0.52,top=h*0.05,over=h*0.17,lx=w*0.06,rx=w*0.94;
  const tt=(top-over-jy)/(top-jy),slx=(jx+tt*(lx-jx)).toFixed(1),srx=(jx+tt*(rx-jx)).toFixed(1),sty=(top-over).toFixed(1),J=`${jx.toFixed(1)},${jy.toFixed(1)}`;
  const d=`M${slx},${sty} L${J} L${jx.toFixed(1)},${h} M${srx},${sty} L${J}`;
  return `<svg width="${w.toFixed(1)}" height="${h}" viewBox="0 0 ${w.toFixed(1)} ${h}" fill="none" style="overflow:visible">
    <defs><clipPath id="yc${n}"><rect x="-30" y="${top.toFixed(1)}" width="${(w+60).toFixed(1)}" height="${h}"/></clipPath></defs>
    <path d="${d}" stroke="url(#${grad})" stroke-width="${(sw*1.3).toFixed(1)}" stroke-linejoin="round" filter="url(#gB)" opacity=".08"/>
    <g clip-path="url(#yc${n})"><path d="${d}" stroke="url(#${grad})" stroke-width="${sw.toFixed(1)}" stroke-linecap="butt" stroke-linejoin="round"/></g></svg>`;}

const SB=`<div class="notch"></div><div class="sbar"><div>9:41</div><div>📶 100%</div></div>`;

const TAB={
  home:'<svg width="23" height="23" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 3 10v10h6v-6h6v6h6V10z"/></svg>',
  freq:'<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="2" fill="currentColor"/><path d="M7.5 7.5a6.4 6.4 0 000 9M16.5 7.5a6.4 6.4 0 010 9M4.7 4.7a10.3 10.3 0 000 14.6M19.3 4.7a10.3 10.3 0 010 14.6"/></svg>',
  lib:'<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M7 9h10M7 12h10M7 15h6"/></svg>',
  search:'<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4.5 4.5"/></svg>'
};

const tabbar=a=>`<div class="tabbar">${[['home','Home'],['freq','Radio'],['lib','Library'],['search','Search']].map(([k,l])=>`<div class="tab ${k===a?'on':''}">${TAB[k]}<span>${l}</span></div>`).join('')}</div>`;

const mini=()=>`<div class="mini"><div style="width:48px;height:48px;border-radius:13px;overflow:hidden;position:relative;background:#120e22"><div class="wm spin" style="inset:-14px">${mandala(76,'gold',0.6,0.7)}</div></div>
  <div class="mt"><div class="a">Wellness Live</div><div class="b"><span class="live">LIVE</span></div></div>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--gold)"><rect x="6" y="5" width="4" height="14" rx="1.3"/><rect x="14" y="5" width="4" height="14" rx="1.3"/></svg></div>`;

function spark(W,H,seed){const N=46;const pts=Array.from({length:N},(_,i)=>28+10*Math.sin(i*.5+seed)+6*Math.sin(i*1.3)+(i>N-9?(i-(N-9))*1.5:0));
  const mn=Math.min(...pts),mx=Math.max(...pts);
  const d=pts.map((v,i)=>((i?'L':'M')+(W*i/(N-1)).toFixed(1)+','+(H-4-((v-mn)/(mx-mn||1))*(H-12)).toFixed(1))).join(' ');
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" fill="none"><path d="${d}" stroke="url(#teal)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

function sparkGold(W,H,seed){const N=36;const pts=Array.from({length:N},(_,i)=>28+8*Math.sin(i*.6+seed)+5*Math.sin(i*1.1));
  const mn=Math.min(...pts),mx=Math.max(...pts);
  const d=pts.map((v,i)=>((i?'L':'M')+(W*i/(N-1)).toFixed(1)+','+(H-4-((v-mn)/(mx-mn||1))*(H-10)).toFixed(1))).join(' ');
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" fill="none"><path d="${d}" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

/* mic SVG glyph — teal/violet */
const micGlyph=`<svg width="62" height="80" viewBox="0 0 62 80" fill="none">
  <rect x="18" y="4" width="26" height="40" rx="13" stroke="url(#teal)" stroke-width="2.5"/>
  <rect x="24" y="10" width="14" height="28" rx="7" fill="url(#violet)" opacity=".18"/>
  <path d="M8 38c0 12.7 10.3 23 23 23s23-10.3 23-23" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="61" x2="31" y2="74" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="74" x2="44" y2="74" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round"/>
</svg>`;

/* settingsRow helper: label + right content */
const srow=(lbl,right,danger)=>`<div class="srow"><span class="srow-lbl" style="${danger?'color:#ef9a9a':''}">${lbl}</span><span class="${right==='›'?'srow-val':'muted'}" style="font-size:${right==='›'?'18px':'13px'}">${right}</span></div>`;

/* listRow helper: icon box + title + subtitle + right element */
const listRow=(icon,title,sub,right)=>`<div style="display:flex;align-items:center;gap:13px;padding:10px 0">
  <div style="width:54px;height:54px;border-radius:14px;background:rgba(94,234,212,.08);border:1px solid rgba(94,234,212,.2);display:flex;align-items:center;justify-content:center;flex:none">${icon}</div>
  <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${title}</div><div class="muted" style="font-size:12px;margin-top:2px">${sub}</div></div>
  ${right}</div>`;

/* selectChips: label + options array, selectedIdx */
const selectChips=(label,opts,sel)=>`<div style="margin-bottom:14px">
  <div class="muted" style="font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase">${label}</div>
  <div style="display:flex;flex-wrap:wrap;gap:7px">${opts.map((o,i)=>`<span class="chip${i===sel?' chip-sel':''}">${o}</span>`).join('')}</div></div>`;

const S=[];
const add=(flow,name,taps,html)=>S.push({flow,name,taps,html});

/* ══════════════════════════════════════════════════════
   FLOW 1 — Sign in
   ══════════════════════════════════════════════════════ */

add('① Sign in','Welcome',[
  'Tune in → Sign in'
],`${SB}<div class="body"><div class="center" style="height:100%;justify-content:space-between;padding:60px 30px 54px">
  <div class="center">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;width:330px;height:204px">
      <div style="position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(243,205,139,.55),transparent 64%);filter:blur(36px);opacity:.5"></div>
      <div class="breathe" style="position:absolute;width:284px;height:284px;opacity:.5">${mandala(284,'gold',0.45,0.65)}</div>
      <div style="position:relative;display:flex;align-items:center;gap:0">
        ${yLetter(110,'a','yg1')}<img src="../../assets/images/logo-cut2.png" class="logoW logoW1" alt="thrive radio"/>${yLetter(110,'b','yg1')}
      </div>
    </div>
    <div class="disp" style="font-size:34px;font-weight:600;margin-top:14px;letter-spacing:.5px">Thrive Radio</div>
    <div class="muted" style="font-size:15px;max-width:248px;margin-top:8px;line-height:1.5">You Only Younger — healing frequencies, attuned to you.</div>
  </div>
  <div style="width:100%">
    <div class="btn btn-gold">Tune in</div>
  </div>
</div></div>`);

add('① Sign in','Sign in · password',[
  'Sign in → Home (signed in)',
  '‹ Back → Welcome'
],`${SB}<div class="body pad" style="padding-top:8px">
  <div style="color:var(--gold);font-size:15px;font-family:var(--disp);margin-bottom:28px">‹ Back</div>
  <div class="disp" style="font-size:28px;font-weight:700;margin-bottom:8px">Sign in</div>
  <div class="muted" style="font-size:14px;line-height:1.55;margin-bottom:28px">Use your email or username and password to log in.</div>
  <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px">
    <div class="field">Email or username</div>
    <div class="field" style="letter-spacing:6px">••••••••••</div>
  </div>
  <div class="btn btn-gold" style="height:54px">Sign in</div>
</div>`);

add('① Sign in','Sign in · code (2FA)',[
  'Continue → Home',
  '‹ Back to password → password step'
],`${SB}<div class="body pad" style="padding-top:8px">
  <div style="color:var(--gold);font-size:15px;font-family:var(--disp);margin-bottom:28px">‹ Back</div>
  <div class="disp" style="font-size:28px;font-weight:700;margin-bottom:8px">Enter your code</div>
  <div class="muted" style="font-size:14px;line-height:1.55;margin-bottom:28px">Your account has two-factor sign-in. We sent a 6-digit code to your email.</div>
  <div class="field" style="justify-content:center;letter-spacing:18px;font-size:20px;font-family:var(--disp);font-weight:600;color:var(--ink);height:60px;margin-bottom:22px">1 2 3 4 5 6</div>
  <div style="color:var(--teal);font-size:13px;text-align:center;margin-bottom:24px">‹ Back to password</div>

const flows=document.getElementById('flows');
const flowMap=new Map();
S.forEach(s=>{
  if(!flowMap.has(s.flow))flowMap.set(s.flow,[]);
  flowMap.get(s.flow).push(s);
});

const FLOW_DESCS={
  '① Sign in':'Provider-issued login → the app.',
  '② Home & browse':'Tabs: Home, Radio, Library, Search. Mini-player floats above the tab bar.',
  '③ Live HRV (WHOOP)':'Connect WHOOP once in Settings → a teal pulse icon appears on Now Playing (HRV off) → tap it to start recording (icon becomes a red filled stop circle) → stabilising (~30s) → finding baseline (~30s) → tracking live (state word: Settling ▲+N%, Holding steady, Activated ▼−N%) → tap red circle to stop & save → Session summary. Audio never stops. BLE failures show an inline message + Retry on the player (no modal/sheet).',
  '④ Voice check-in & Vitality':'3 voice recordings → review → upload → score. Baseline needs 3 days.',
  '⑤ Account & WHOOP cloud':'Identity, health profile, and the WHOOP cloud connection (recovery/HRV/weight trends).'
};

flowMap.forEach((screens,flowName)=>{
  const fb=document.createElement('div');
  fb.className='flow-block';

  const fh=document.createElement('div');
  fh.className='flow-header';
  fh.innerHTML=`<div class="flow-title">${flowName}</div><div class="flow-desc">${FLOW_DESCS[flowName]||''}</div>`;
  fb.appendChild(fh);

  const row=document.createElement('div');
  row.className='screen-row';

  screens.forEach(s=>{
    const c=document.createElement('div');
    c.className='cell';
    const tapsHtml=s.taps&&s.taps.length
      ?`<ul class="taps">${s.taps.map(t=>`<li>${t}</li>`).join('')}</ul>`
      :`<ul class="taps"><li style="color:#4a4760">no tap targets</li></ul>`;
    c.innerHTML=`<div class="screen"><div class="aura"></div>${s.html}</div><div class="cap">${s.name}</div>${tapsHtml}`;
    row.appendChild(c);
  });

  fb.appendChild(row);
  flows.appendChild(fb);
});
